services:
  - type: web
    name: eventmatch
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate
      gunicorn wedding_planner.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventmatch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
      - key: PYTHON_VERSION
        value: 3.14.3
    staticAssets:
      - path: /static
        directory: staticfiles